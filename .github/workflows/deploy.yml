name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        type: choice
        options: [staging, production]
        required: true
        default: 'staging'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - run: |
          find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \; 2>&1 | grep -q "Parse error" && exit 1 || echo "✅ PHP OK"

  deploy:
    needs: lint
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync deploy
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          if [ "$ENV" = "production" ]; then
            TARGET="/www/wwwroot/janusbanana.com.cn"
          else
            TARGET="/www/wwwroot/staging.janusbanana.com.cn"
          fi
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'config.inc.php' \
            --exclude 'usr/uploads' \
            --exclude 'var/cache' \
            --exclude '*.log' \
            --exclude '*.bak' \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$TARGET/

      - name: Post-deploy tasks
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          if [ "$ENV" = "production" ]; then
            TARGET="/www/wwwroot/janusbanana.com.cn"
            DOMAIN="janusbanana.com.cn"
          else
            TARGET="/www/wwwroot/staging.janusbanana.com.cn"
            DOMAIN="staging.janusbanana.com.cn"
          fi
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd $TARGET
            chown -R www:www .
            php sitemap.php > sitemap.xml 2>/dev/null || true
            php feed.php > feed.json 2>/dev/null || true
          "

      - name: Health check
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          if [ "$ENV" = "production" ]; then
            DOMAIN="janusbanana.com.cn"
          else
            DOMAIN="staging.janusbanana.com.cn"
          fi
          sleep 3
          curl -sf -o /dev/null -w "%{http_code}" "http://$DOMAIN/" | grep -q "200" && echo "✅ $DOMAIN OK" || (echo "❌ $DOMAIN FAIL" && exit 1)
